# ── Shell / Terminal ────────────────────────────────────────

# Use zsh as default
set -g default-shell /bin/zsh

# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal "tmux-256color"   # Set terminal type for 256-color support
set -ag terminal-overrides ",*:RGB"              # Enable true color for any terminal

# ── General ─────────────────────────────────────────────────

set -g set-clipboard on         # Use system clipboard
set -g detach-on-destroy off    # Don't exit from tmux when closing a session
set -g escape-time 0            # Remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 1000000    # Increase history size (from 2,000)
set -g mouse on                 # Enable mouse support
set -g status-interval 3        # Update the status bar every 3 seconds (default: 15 seconds)
set -g focus-events on          # Enable focus events (needed for nvim autoread)
set -g allow-passthrough all    # Allow passthrough from all panes including popups (needed for image preview)
set -g update-environment "DISPLAY SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM TERM_PROGRAM"
set -g base-index 1             # Start windows at 1
set -g pane-base-index 1        # Start panes at 1
set -g renumber-windows on      # Automatically renumber windows when one is closed

# ── Prefix ──────────────────────────────────────────────────

set -g prefix C-b
bind C-b send-prefix

# ── Keybinds ────────────────────────────────────────────────

# Refresh tmux config with r
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Split horizontally in CWD with \
# #{pane_current_path} opens new pane in the same directory as the current one
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with -
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Use vim arrow keys to resize
# -r = repeatable (press prefix once, then repeat key within timeout)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Use m key to maximize pane
bind -r m resize-pane -Z

# Equalize pane sizes
bind = select-layout -E

# Rename pane (like , renames window)
bind . command-prompt -p "pane title:" "select-pane -T '%%'"

# Kill pane without confirmation
bind x kill-pane

# Kill window without confirmation
unbind w
bind w confirm-before -p "Kill window #W? (y/n)" kill-window

# List windows (Shift-W, since w is kill-window)
bind W choose-tree -w

# ── Floating Popups ──────────────────────────────────────────

bind-key C-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "TERM=xterm-kitty yazi"
bind-key C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "zsh"
bind-key C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind-key C-d display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazydocker"

# ── Vi Mode / Copy ──────────────────────────────────────────

# Enable vi mode to allow us to use vim keys to move around in copy mode (Prefix + [ places us in copy mode)
set-window-option -g mode-keys vi

# Start selecting text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Copy text with "y"
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste yanked text with "Prefix + P" ("Prefix + p" goes to previous window)
bind P paste-buffer

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Cmd+C support via Ghostty keybind (sends custom escape sequence)
set -s user-keys[0] "\e[99~"
# In copy mode: copy selection to clipboard and exit copy mode
bind-key -T copy-mode-vi User0 send-keys -X copy-pipe-and-cancel "pbcopy"
# In normal mode: send Ctrl+C (interrupt) as usual
bind-key -T root User0 send-keys C-c

# ── Plugins ─────────────────────────────────────────────────

# tpm plugin manager
set -g @plugin 'tmux-plugins/tpm'

# List of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # Enable navigating between nvim and tmux
set -g @plugin 'dracula/tmux'                    # Status bar theme (load before continuum so it doesn't overwrite the save hook)
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'    # Automatically saves sessions every 15 minutes

# ── Theme (Solarized Dark via Dracula) ────────────────────────

# Status bar position (dracula does not set this)
set -g status-position top

# Solarized Dark palette
set -g @dracula-colors "
solarized_base03='#002b36'
solarized_base02='#073642'
solarized_base01='#586e75'
solarized_base0='#839496'
solarized_base1='#93a1a1'
solarized_yellow='#b58900'
solarized_orange='#cb4b16'
solarized_red='#dc322f'
solarized_magenta='#d33682'
solarized_violet='#6c71c4'
solarized_blue='#268bd2'
solarized_cyan='#2aa198'
solarized_green='#859900'
dark_gray='#073642'
gray='#0a4050'
dark_purple='#586e75'
light_purple='#839496'
white='#93a1a1'
green='#268bd2'
yellow='#268bd2'
"

# Powerline separators with colored segment backgrounds
set -g @dracula-show-powerline true

# Left icon: Apple logo only (single session workflow)
set -g @dracula-show-left-icon ""

# Modules (left-to-right on right side of bar)
set -g @dracula-plugins "cpu-usage custom:ram_percent.sh weather"
set -g @dracula-show-empty-plugins false

# CPU label with nerd font icon (icon patched via python3)
set -g @dracula-cpu-usage-label " "

# Module segment colors: [background] [foreground]
set -g @dracula-cpu-usage-colors "solarized_yellow solarized_base02"
set -g @dracula-custom-plugin-colors "solarized_cyan solarized_base02"
set -g @dracula-weather-colors "solarized_blue solarized_base02"
# Windows flush left next to icon
set -g status-justify left

# Show window flags (zoom indicator as Z)
set -g @dracula-show-flags true

# Refresh rate (match current 3-second interval)
set -g @dracula-refresh-rate 3

# ── Resurrect ───────────────────────────────────────────────

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on' # Auto-restore last saved session on tmux start

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Re-unbind defaults after plugin init (tpm may re-add % and " split bindings)
unbind %
unbind \"

# Pane borders: bright blue on active, dim on inactive (after TPM to override Dracula)
set -g pane-active-border-style "fg=#268bd2"
set -g pane-border-style "fg=#073642"
set -g pane-border-status top
set -g pane-border-format " #T "
