# ── Shell / Terminal ────────────────────────────────────────

# Use zsh as default
set -g default-shell /bin/zsh

# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal "screen-256color" # Set terminal type for 256-color support
set -ga terminal-overrides ",*256col*:Tc" # Override to enable true-color for compatible terminals

# ── General ─────────────────────────────────────────────────

set -g set-clipboard on         # Use system clipboard
set -g detach-on-destroy off    # Don't exit from tmux when closing a session
set -g escape-time 0            # Remove delay for exiting insert mode with ESC in Neovim
set -g history-limit 1000000    # Increase history size (from 2,000)
set -g mouse on                 # Enable mouse support
set -g status-interval 3        # Update the status bar every 3 seconds (default: 15 seconds)
set -g focus-events on          # Enable focus events (needed for nvim autoread)
set -g allow-passthrough on     # Allow programs in the pane to bypass tmux (e.g. for image preview)

# ── Prefix ──────────────────────────────────────────────────

set -g prefix C-b
bind C-b send-prefix

# ── Keybinds ────────────────────────────────────────────────

# Refresh tmux config with r
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Split horizontally in CWD with \
# #{pane_current_path} opens new pane in the same directory as the current one
unbind %
bind \\ split-window -h -c "#{pane_current_path}"

# Split vertically in CWD with -
unbind \"
bind - split-window -v -c "#{pane_current_path}"

# New window in same path
bind c new-window -c "#{pane_current_path}"

# Use vim arrow keys to resize
# -r = repeatable (press prefix once, then repeat key within timeout)
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Use m key to maximize pane
bind -r m resize-pane -Z

# Equalize pane sizes
bind e select-layout -E

# Kill pane without confirmation
bind x kill-pane

# Kill window without confirmation
unbind w
bind w kill-window

# List windows (Shift-W, since w is kill-window)
bind W choose-tree -w

# ── Vi Mode / Copy ──────────────────────────────────────────

# Enable vi mode to allow us to use vim keys to move around in copy mode (Prefix + [ places us in copy mode)
set-window-option -g mode-keys vi

# Start selecting text with "v"
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Copy text with "y"
bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste yanked text with "Prefix + P" ("Prefix + p" goes to previous window)
bind P paste-buffer

# Don't exit copy mode when dragging with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Cmd+C support via Ghostty keybind (sends custom escape sequence)
set -s user-keys[0] "\e[99~"
# In copy mode: copy selection to clipboard and exit copy mode
bind-key -T copy-mode-vi User0 send-keys -X copy-pipe-and-cancel "pbcopy"
# In normal mode: send Ctrl+C (interrupt) as usual
bind-key -T root User0 send-keys C-c

# ── Numbering ───────────────────────────────────────────────

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on # Automatically renumber windows when one is closed

# ── Plugins ─────────────────────────────────────────────────

# tpm plugin manager
set -g @plugin 'tmux-plugins/tpm'

# List of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator' # Enable navigating between nvim and tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum'    # Automatically saves sessions every 15 minutes
set -g @plugin 'dracula/tmux'                    # Status bar theme

# ── Theme (Solarized Dark via Dracula) ────────────────────────

# Status bar position (dracula does not set this)
set -g status-position top

# Solarized dark palette mapped onto Dracula color variables
set -g @dracula-colors "
dark_gray='#073642'
gray='#0a4050'
dark_purple='#586e75'
light_purple='#839496'
white='#93a1a1'
cyan='#2aa198'
green='#268bd2'
yellow='#b58900'
orange='#268bd2'
red='#dc322f'
pink='#6c71c4'
"

# Powerline separators with colored segment backgrounds
set -g @dracula-show-powerline true

# Higher contrast pane borders
set -g @dracula-border-contrast true

# Left icon: Apple logo only (single session workflow)
set -g @dracula-show-left-icon ""

# Modules (left-to-right on right side of bar)
set -g @dracula-plugins "cpu-usage custom:ram_percent.sh weather"
set -g @dracula-show-empty-plugins false

# CPU label with nerd font icon (icon patched via python3)
set -g @dracula-cpu-usage-label " "

# Module segment colors: [background] [foreground]
set -g @dracula-cpu-usage-colors "cyan dark_gray"
set -g @dracula-custom-plugin-colors "orange dark_gray"
set -g @dracula-weather-colors "pink dark_gray"

# Windows flush left next to icon
set -g status-justify left

# Weather: Celsius, fixed to Melbourne (no comma to avoid tmux #() arg splitting)
set -g @dracula-show-fahrenheit false
set -g @dracula-fixed-location "Melbourne"
set -g @dracula-show-location true

# Show window flags (zoom indicator as Z)
set -g @dracula-show-flags true

# Refresh rate (match current 3-second interval)
set -g @dracula-refresh-rate 3

# ── Resurrect ───────────────────────────────────────────────

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on' # Auto-restore last saved session on tmux start

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Re-unbind defaults after plugin init (tpm may re-add % and " split bindings)
unbind %
unbind \"
